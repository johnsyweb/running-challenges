# Website screenshots to capture. Each entry loads the URL (live parkrun site)
# with the Chrome extension loaded, then captures the area between top and bottom.
#
# filename: path from repo root (e.g. images/screenshots/name.png)
# url: full parkrun parkrunner "all" page URL
# top: CSS selector for the top of the capture area
# bottom: CSS selector for the bottom of the capture area

screenshots:
  - filename: images/screenshots/runner_page.png
    url: https://www.parkrun.org.uk/parkrunner/1386351/all/
    top: "#content > h2"
    bottom: "#results"

